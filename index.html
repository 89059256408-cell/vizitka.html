<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Наталья Воробьева — Инвестброкер</title>
  <style>
    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    :root {
      --gold: #c9a84c;
      --gold-light: #f0d080;
      --gold-dark: #7a5c1e;
      --bg: #0a0a0a;
      --card-bg: #111111;
      --text: #e8e8e8;
      --muted: #888;

    @keyframes gradientShift {
      0%   { background-position: 0% 50%; }
      50%  { background-position: 100% 50%; }
      100% { background-position: 0% 50%; }
    }

    @keyframes glowPulse {
      0%, 100% { text-shadow: 0 0 20px rgba(201,168,76,0.4), 0 0 40px rgba(201,168,76,0.2); }
      50%       { text-shadow: 0 0 30px rgba(201,168,76,0.7), 0 0 60px rgba(201,168,76,0.4), 0 0 80px rgba(201,168,76,0.2); }
    }

    @keyframes fadeInUp {
      from { opacity: 0; transform: translateY(30px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    @keyframes lineExpand {
      from { width: 0; }
      to   { width: 80px; }
    }

    @keyframes buttonPulse {
      0%, 100% { box-shadow: 0 0 0 0 rgba(201,168,76,0.4); }
      50%       { box-shadow: 0 0 0 12px rgba(201,168,76,0); }
    }

    @keyframes particleFloat {
      0%   { transform: translateY(0px) rotate(0deg); opacity: 0.6; }
      50%  { opacity: 1; }
      100% { transform: translateY(-100vh) rotate(720deg); opacity: 0; }
    }

    html, body {
      height: 100%;
      background: var(--bg);
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      color: var(--text);
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      overflow-x: hidden;
    }

    /* Floating particles */
    .particles {
      position: fixed;
      inset: 0;
      pointer-events: none;
      overflow: hidden;
      z-index: 0;
    }

    .particle {
      position: absolute;
      bottom: -10px;
      width: 4px;
      height: 4px;
      border-radius: 50%;
      background: var(--gold);
      animation: particleFloat linear infinite;
    }

    .particle:nth-child(1)  { left: 10%; width: 3px; height: 3px; animation-duration: 14s; animation-delay: 0s; }
    .particle:nth-child(2)  { left: 25%; width: 2px; height: 2px; animation-duration: 18s; animation-delay: 3s; }
    .particle:nth-child(3)  { left: 40%; width: 4px; height: 4px; animation-duration: 12s; animation-delay: 6s; }
    .particle:nth-child(4)  { left: 60%; width: 2px; height: 2px; animation-duration: 20s; animation-delay: 1s; }
    .particle:nth-child(5)  { left: 75%; width: 3px; height: 3px; animation-duration: 16s; animation-delay: 4s; }
    .particle:nth-child(6)  { left: 88%; width: 2px; height: 2px; animation-duration: 22s; animation-delay: 8s; }

    /* Background radial glow */
    .bg-glow {
      position: fixed;
      inset: 0;
      background:
        radial-gradient(ellipse 60% 40% at 50% 0%, rgba(201,168,76,0.08) 0%, transparent 70%),
        radial-gradient(ellipse 40% 30% at 80% 80%, rgba(201,168,76,0.04) 0%, transparent 60%);
      pointer-events: none;
      z-index: 0;
    }

    .card {
      position: relative;
      z-index: 1;
      width: min(520px, 92vw);
      background: var(--card-bg);
      border: 1px solid rgba(201,168,76,0.18);
      border-radius: 24px;
      padding: 52px 44px 44px;
      text-align: center;
      animation: fadeInUp 0.8s ease both;
      box-shadow:
        0 0 0 1px rgba(201,168,76,0.06),
        0 8px 32px rgba(0,0,0,0.6),
        0 0 80px rgba(201,168,76,0.05);
    }

    /* Top accent line */
    .card::before {
      content: '';
      position: absolute;
      top: 0;
      left: 50%;
      transform: translateX(-50%);
      height: 2px;
      background: linear-gradient(90deg, transparent, var(--gold), transparent);
      border-radius: 0 0 4px 4px;
      animation: lineExpand 1.2s ease 0.3s both;
    }

    /* Avatar */
    .avatar-wrap {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 88px;
      height: 88px;
      border-radius: 50%;
      background: linear-gradient(135deg, var(--gold-dark), var(--gold), var(--gold-light));
      background-size: 200% 200%;
      animation: gradientShift 4s ease infinite, fadeInUp 0.8s ease 0.1s both;
      margin-bottom: 24px;
      box-shadow: 0 0 30px rgba(201,168,76,0.3);
      flex-shrink: 0;
    }

    .avatar-initials {
      font-size: 28px;
      font-weight: 700;
      color: #0a0a0a;
      letter-spacing: 1px;
      user-select: none;
    }

    /* Name */
    .name {
      font-size: clamp(1.75rem, 5vw, 2.4rem);
      font-weight: 800;
      letter-spacing: -0.5px;
      line-height: 1.15;
      background: linear-gradient(135deg, var(--gold-light) 0%, var(--gold) 50%, var(--gold-dark) 100%);
      background-size: 200% auto;
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      animation:
        gradientShift 4s ease infinite,
        glowPulse 3s ease-in-out infinite,
        fadeInUp 0.8s ease 0.2s both;
      margin-bottom: 4px;
    }

    /* Divider */
    .divider {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 12px;
      margin: 18px auto;
      animation: fadeInUp 0.8s ease 0.3s both;
    }

    .divider-line {
      height: 1px;
      width: 50px;
      background: linear-gradient(90deg, transparent, rgba(201,168,76,0.4));
    }

    .divider-line:last-child {
      transform: scaleX(-1);
    }

    .divider-diamond {
      width: 6px;
      height: 6px;
      background: var(--gold);
      transform: rotate(45deg);
      box-shadow: 0 0 8px var(--gold);
    }

    /* Specialization */
    .spec {
      font-size: clamp(0.8rem, 2.5vw, 0.92rem);
      font-weight: 500;
      letter-spacing: 2.5px;
      text-transform: uppercase;
      color: var(--gold);
      opacity: 0.85;
      animation: fadeInUp 0.8s ease 0.35s both;
      margin-bottom: 6px;
    }

    .spec-sub {
      font-size: clamp(0.75rem, 2.2vw, 0.82rem);
      color: var(--muted);
      letter-spacing: 1px;
      animation: fadeInUp 0.8s ease 0.4s both;
    }

    /* Socials */
    .socials {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 16px;
      margin: 32px 0 28px;
      animation: fadeInUp 0.8s ease 0.5s both;
    }

    .social-link {
      display: flex;
      align-items: center;
      justify-content: center;
      width: 52px;
      height: 52px;
      border-radius: 14px;
      border: 1px solid rgba(201,168,76,0.2);
      background: rgba(201,168,76,0.04);
      color: var(--gold);
      text-decoration: none;
      transition:
        transform 0.25s ease,
        background 0.25s ease,
        border-color 0.25s ease,
        box-shadow 0.25s ease;
    }

    .social-link:hover {
      transform: translateY(-5px) scale(1.08);
      background: rgba(201,168,76,0.12);
      border-color: rgba(201,168,76,0.6);
      box-shadow: 0 8px 24px rgba(201,168,76,0.2);
    }

    .social-link svg {
      width: 24px;
      height: 24px;
      fill: currentColor;
    }

    /* Label under icon */
    .social-wrap {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 6px;
    }

    .social-label {
      font-size: 0.65rem;
      color: var(--muted);
      letter-spacing: 0.5px;
    }

    /* CTA Button */
    .cta {
      display: inline-block;
      padding: 15px 44px;
      border-radius: 50px;
      font-size: 1rem;
      font-weight: 700;
      letter-spacing: 0.5px;
      text-decoration: none;
      color: #0a0a0a;
      background: linear-gradient(135deg, var(--gold-light), var(--gold), var(--gold-dark));
      background-size: 200% auto;
      border: none;
      cursor: pointer;
      transition: background-position 0.4s ease, transform 0.2s ease, box-shadow 0.2s ease;
      animation:
        fadeInUp 0.8s ease 0.6s both,
        buttonPulse 2.5s ease-in-out 1.5s infinite;
      position: relative;
      overflow: hidden;
    }

    .cta::after {
      content: '';
      position: absolute;
      inset: 0;
      border-radius: inherit;
      background: linear-gradient(135deg, rgba(255,255,255,0.15), transparent);
      opacity: 0;
      transition: opacity 0.2s;
    }

    .cta:hover {
      background-position: right center;
      transform: translateY(-3px);
      box-shadow: 0 12px 32px rgba(201,168,76,0.45);
      animation: none;
    }

    .cta:hover::after {
      opacity: 1;
    }

    .cta:active {
      transform: translateY(0);
    }

    /* Footer tag */
    .tag {
      margin-top: 32px;
      font-size: 0.72rem;
      color: rgba(136,136,136,0.5);
      letter-spacing: 1.5px;
      text-transform: uppercase;
      animation: fadeInUp 0.8s ease 0.7s both;
    }

    /* Mobile */
    @media (max-width: 480px) {
      .card {
        padding: 40px 28px 36px;
        border-radius: 20px;
      }

      .avatar-wrap {
        width: 76px;
        height: 76px;
      }

      .social-link {
        width: 48px;
        height: 48px;
        border-radius: 12px;
      }

      .cta {
        padding: 14px 36px;
        font-size: 0.95rem;
      }
    }
  </style>
</head>
